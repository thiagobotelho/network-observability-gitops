apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

labels:
  - pairs:
      app.kubernetes.io/name: network-observability
      app.kubernetes.io/instance: network-observability-desenvolvimento
      app.kubernetes.io/component: flow-observability
      app.kubernetes.io/part-of: observability
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/environment: desenvolvimento
    includeSelectors: false

patches:
  - target:
      group: loki.grafana.com
      version: v1
      kind: LokiStack
      name: loki
      namespace: netobserv
    patch: |-
      - op: add
        path: /spec/storageClassName
        value: crc-csi-hostpath-provisioner
